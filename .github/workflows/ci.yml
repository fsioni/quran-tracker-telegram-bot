name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5  # reads packageManager from package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5  # reads packageManager from package.json
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy
        id: deploy
        # Requires BOT_TOKEN and ALLOWED_USER_ID to be set as Cloudflare secrets
        # (via wrangler secret put) before first deploy
        run: |
          sed -i 's/<YOUR_D1_DATABASE_ID>/${{ secrets.D1_DATABASE_ID }}/' wrangler.toml
          DEPLOY_OUTPUT=$(npx wrangler deploy 2>&1)
          echo "$DEPLOY_OUTPUT"
          # Strip ANSI escape codes (wrangler v4 emits colors even in CI)
          CLEAN_OUTPUT=$(echo "$DEPLOY_OUTPUT" | sed 's/\x1b\[[0-9;]*[a-zA-Z]//g')
          WORKER_URL=$(echo "$CLEAN_OUTPUT" | grep -oE 'https://[^ ]+\.workers\.dev' | head -1)
          if [ -z "$WORKER_URL" ]; then
            echo "::error::Could not detect Worker URL from wrangler output"
            exit 1
          fi
          echo "worker_url=$WORKER_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NO_COLOR: "1"
      - name: Register bot commands
        run: |
          curl -sS --fail-with-body -X POST "${{ steps.deploy.outputs.worker_url }}/setup" \
            -H "Authorization: Bearer ${{ secrets.BOT_TOKEN }}"
