# Secrets requis : BOT_TOKEN, ALLOWED_USER_ID, MCP_SESSION_HMAC_SECRET
name = "quran-telegram-bot"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "quran-tracker"
database_id = "<YOUR_D1_DATABASE_ID>"  # Run: wrangler d1 create quran-tracker
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "<OAUTH_KV_NAMESPACE_ID>"  # Run: wrangler kv namespace create OAUTH_KV

[triggers]
crons = ["*/5 * * * *"]
