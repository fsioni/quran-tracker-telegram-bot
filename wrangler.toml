# Secrets requis : BOT_TOKEN, ALLOWED_USER_ID
name = "quran-tracker-telegram-bot"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "quran-tracker"
database_id = "<YOUR_D1_DATABASE_ID>"  # Run: wrangler d1 create quran-tracker
migrations_dir = "migrations"

[triggers]
crons = ["*/5 * * * *"]
